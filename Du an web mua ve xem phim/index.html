<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Movie Booking Pro</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">
<div class="logo">🎬 Movie Booking</div>

<nav>
<a onclick="scrollToSection('phimSection')">Phim</a>
<a onclick="scrollToSection('detailSection')">Trailer</a>
<a onclick="scrollToSection('bookingSection')">Đặt vé</a>
</nav>
</header>


<!-- BANNER -->
<div class="banner">
<div class="banner-overlay">
<h1>Đặt vé phim online</h1>
<p>Trải nghiệm điện ảnh đỉnh cao</p>
<button class="btn-book"
onclick="scrollToSection('phimSection')">
Đặt vé ngay
</button>
</div>
</div>


<!-- PHIM -->
<section id="phimSection">
<h2>Phim đang chiếu</h2>
<div id="movieList" class="movie-grid"></div>
</section>


<!-- TRAILER -->
<section id="detailSection">
<h2 id="movieTitle"></h2>
<iframe id="trailer" allowfullscreen></iframe>
</section>


<!-- BOOKING -->
<section id="bookingSection" class="hidden">

<h2>Đặt vé</h2>

<div class="booking-layout">

<div class="area-box">
<h3>Khu vực</h3>
<ul id="areaList"></ul>
</div>

<div class="cinema-box">
<h3>Rạp & Suất chiếu</h3>
<div id="cinemaList"></div>
</div>

</div>


<h3>Chọn ghế</h3>

<div class="screen-container">
<div class="screen-text">MÀN HÌNH</div>
<div class="screen-bar"></div>
</div>

<div id="seats" class="seats-grid"></div>


<div class="legend">
<div><span class="seat normal"></span> Ghế thường (90k)</div>
<div><span class="seat vip"></span> Ghế VIP (120k)</div>
<div><span class="seat selected"></span> Ghế bạn chọn</div>
</div>


<p>Ghế đã chọn: <span id="seatList"></span></p>
<p>Tổng tiền: <span id="total">0</span> VND</p>


<div class="payment-box">

<h3>Thanh toán</h3>

<button class="btn-book" onclick="confirmBooking()">
Xác nhận đặt vé
</button>


<p id="message"></p>

</div>

</section>


<script src="script.js"></script>

</body>
</html>
